<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Game Bar — Играй и выигрывай</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --accent: #f7971e;
            --accent2: #ffd200;
            --win: #4CAF50;
            --lose: #ff6b6b;
            --card-bg: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
        }
        
        body {
            background: linear-gradient(135deg, #0f0c29, #1a1a2e 40%, #16213e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .game-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 14px 18px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }
        
        .balance {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            padding: 8px 15px;
            border-radius: 25px;
        }
        
        .balance-icon {
            font-size: 22px;
            filter: drop-shadow(0 0 4px rgba(255,215,0,0.5));
        }
        
        .balance-amount {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .username {
            font-size: 13px;
            opacity: 0.7;
            font-weight: 500;
        }
        
        .tab-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 5px;
            border: 1px solid var(--border);
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.5);
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, rgba(247,151,30,0.2), rgba(255,210,0,0.2));
            color: white;
            box-shadow: 0 2px 8px rgba(247,151,30,0.2);
        }
        
        .tab-btn:active {
            transform: scale(0.96);
        }
        
        .tab-content {
            display: none;
            flex: 1;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .games-menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .game-card {
            background: linear-gradient(145deg, rgba(42,42,74,0.8), rgba(26,26,58,0.9));
            border-radius: 18px;
            padding: 18px 8px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        
        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }
        
        .game-card:active {
            transform: scale(0.95);
            border-color: var(--accent);
        }
        
        .game-emoji {
            font-size: 40px;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        
        .game-name {
            font-size: 13px;
            font-weight: 500;
            opacity: 0.8;
        }
        
        .game-area {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
            border: 1px solid var(--border);
        }
        
        .game-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        
        .slot-reels {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 20px 0;
        }
        
        .reel {
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(0,0,0,0.3));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            transition: all 0.3s;
            border: 1px solid var(--border);
        }
        
        .spin-btn {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            color: #1a1a2e;
            font-weight: 700;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin: 12px 5px 5px 5px;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(247,151,30,0.3);
        }
        
        .spin-btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(247,151,30,0.2);
        }
        
        .result-message {
            font-size: 17px;
            margin-top: 15px;
            padding: 12px;
            border-radius: 14px;
            background: rgba(0,0,0,0.3);
            font-weight: 600;
        }
        
        .win {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255,215,0,0.3);
        }
        
        .lose {
            color: #ff6b6b;
        }
        
        .bet-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        
        .bet-option {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            padding: 10px 16px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .bet-option.selected {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a2e;
            border-color: transparent;
            font-weight: 700;
        }
        
        .back-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 16px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .back-btn:active {
            background: rgba(255,255,255,0.15);
        }
        
        .ad-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            border: none;
            color: white;
            font-weight: 600;
            padding: 14px 24px;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 0 4px 15px rgba(76,175,80,0.3);
        }
        
        .ad-btn:active {
            transform: scale(0.97);
        }
        
        .hidden {
            display: none !important;
        }
        
        .roulette-number {
            font-size: 52px;
            margin: 20px;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        
        /* Profile styles */
        .profile-header {
            text-align: center;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 12px;
            box-shadow: 0 8px 25px rgba(247,151,30,0.3);
        }
        
        .profile-username {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .profile-id {
            font-size: 12px;
            opacity: 0.5;
        }
        
        .stat-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        
        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            border: 1px solid var(--border);
        }
        
        .stat-card .stat-icon {
            font-size: 28px;
            margin-bottom: 6px;
        }
        
        .stat-card .stat-value {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-card .stat-label {
            font-size: 11px;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        
        .winrate-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .winrate-fill {
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s;
        }
        
        .games-section {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 600;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .recent-game-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
        }
        
        .recent-game-item:last-child {
            border-bottom: none;
        }
        
        .game-item-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .game-item-emoji {
            font-size: 24px;
        }
        
        .game-item-result {
            font-weight: 700;
            font-size: 14px;
        }
        
        .game-item-result.win {
            color: var(--win);
        }
        
        .game-item-result.lose {
            color: var(--lose);
        }
        
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            background-size: 200% 100%;
            animation: skeleton-pulse 1.5s ease-in-out infinite;
            border-radius: 8px;
        }
        
        @keyframes skeleton-pulse {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .loading-text {
            text-align: center;
            opacity: 0.5;
            padding: 20px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease;
        }
        
        @media (max-width: 400px) {
            .games-menu {
                gap: 8px;
            }
            .game-emoji {
                font-size: 32px;
            }
            .game-name {
                font-size: 11px;
            }
            .game-card {
                padding: 14px 6px;
            }
            .reel {
                width: 55px;
                height: 55px;
                font-size: 32px;
            }
            .bet-option {
                padding: 8px 12px;
                font-size: 12px;
            }
            .stat-cards {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container" id="app">
        <div class="header">
            <div class="balance">
                <span class="balance-icon">💎</span>
                <span class="balance-amount" id="balance">0</span>
            </div>
            <div class="username" id="username">Игрок</div>
        </div>
        
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="games">
                🎮 Игры
            </button>
            <button class="tab-btn" data-tab="profile">
                👤 Профиль
            </button>
        </div>
        
        <div class="tab-content active" id="tab-games">
            <div id="games-menu">
                <div class="games-menu">
                    <div class="game-card" data-game="slots">
                        <div class="game-emoji">🎰</div>

                    </div>
                    <div class="game-card" data-game="roulette">
                        <div class="game-emoji">🎡</div>
                        <div class="game-name">Рулетка</div>
                    </div>
                    <div class="game-card" data-game="dice">
                        <div class="game-emoji">🎲</div>
                        <div class="game-name">Кости</div>
                    </div>
                    <div class="game-card" data-game="blackjack">
                        <div class="game-emoji">🃏</div>
                        <div class="game-name">Блэкджек</div>
                    </div>
                    <div class="game-card" data-game="bowling">
                        <div class="game-emoji">🎳</div>
                        <div class="game-name">Боулинг</div>
                    </div>
                    <div class="game-card" data-game="darts">
                        <div class="game-emoji">🎯</div>
                        <div class="game-name">Дартс</div>
                    </div>
                </div>
                <button class="ad-btn" id="earn-coins-btn">📺 Заработать монеты (25 💎)</button>

            <div id="game-area" class="hidden">
                <div class="game-area">
                    <div class="game-title" id="game-title">🎰 СЛОТЫ</div>
                    
                    <div class="bet-buttons" id="global-bet-buttons">
                        <button class="bet-option" data-bet="10">💰 10</button>
                        <button class="bet-option" data-bet="50">💰 50</button>
                        <button class="bet-option" data-bet="100">💰 100</button>

                    <div id="slots-game">
                        <div class="slot-reels">
                            <div class="reel" id="reel1">🍒</div>
                            <div class="reel" id="reel2">🍒</div>
                            <div class="reel" id="reel3">🍒</div>
                        </div>
                        <div>
                            <button class="spin-btn" id="spin-btn">🎰 КРУТИТЬ</button>
                        </div>
                    </div>
                    
                    <div id="roulette-game" class="hidden">

                            <button class="bet-option" data-roulette="black">⚫ Чёрное</button>
                            <button class="bet-option" data-roulette="green">🟢 Зелёное (0)</button>
                            <button class="bet-option" data-roulette="even">🟡 Чётное</button>
                            <button class="bet-option" data-roulette="odd">🔵 Нечётное</button>
                        </div>
                        <div>
                            <button class="spin-btn" id="roulette-spin-btn">🎡 КРУТИТЬ</button>
                        </div>
                    </div>
                    
                    <div id="dice-game" class="hidden">
                        <div style="display: flex; justify-content: center; gap: 20px; margin: 20px;">
                            <div style="font-size: 48px;" id="dice1">⚀</div>
                            <div style="font-size: 48px;" id="dice2">⚀</div>

                        <div class="bet-buttons" id="dice-bets">
                            <button class="bet-option" data-dice="over">⬆️ Больше 7</button>
                            <button class="bet-option" data-dice="under">⬇️ Меньше 7</button>
                        </div>
                        <div>
                            <button class="spin-btn" id="dice-spin-btn">🎲 БРОСИТЬ</button>
                        </div>
                    </div>
                    
                    <div id="blackjack-game" class="hidden">
                        <div style="margin: 15px 0;">
                            <div>🃏 Ваши карты: <span id="player-cards">—</span> (<span id="player-sum">0</span>)</div>

                        </div>

        <div class="tab-content" id="tab-profile">
            <div class="fade-in">

                    <div class="profile-id" id="profile-id">ID: —</div>
                </div>
                
                <div class="stat-cards">
                    <div class="stat-card">
                        <div class="stat-icon">💎</div>
                        <div class="stat-value" id="profile-balance">0</div>
                        <div class="stat-label">Баланс</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🎮</div>
                        <div class="stat-value" id="profile-games">0</div>
                        <div class="stat-label">Всего игр</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">🏆</div>
                        <div class="stat-value" id="profile-wins">0</div>
                        <div class="stat-label">Побед</div>
                    </div>

                        <div class="stat-icon">📊</div>
                        <div class="stat-value" id="profile-winrate">0%</div>

                            <div class="winrate-fill" id="winrate-fill" style="width: 0%"></div>

                </div>
                
                <div class="games-section" id="recent-games-section">
                    <div class="section-title">🕐 Последние игры</div>
                    <div id="recent-games-list">
                        <div class="loading-text">Загрузка...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        
        const BOT_API_URL = 'https://game-bar-bot.onrender.com';
        
        const webAppUser = tg.initDataUnsafe?.user;
        
        let currentGame = null;
        let currentBet = 100;
        let balance = 0;
        let isLoading = false;
        let userProfile = null;
        
        function getUserId() {
            if (webAppUser && webAppUser.id) return webAppUser.id;
            const urlParams = new URLSearchParams(window.location.search);
            const userIdParam = urlParams.get('user_id');
            if (userIdParam) return parseInt(userIdParam);
            return null;
        }
        
        const userId = getUserId();
        const username = webAppUser?.username || webAppUser?.first_name || 'Игрок';
        document.getElementById('username').innerText = username;
        
        // ===== TAB SYSTEM =====
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.dataset.tab;
                
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                btn.classList.add('active');
                document.getElementById(`tab-${tabName}`).classList.add('active');
                
                if (tabName === 'profile') {
                    loadProfile();
                }
            });
        });
        
        // ===== PROFILE FUNCTIONS =====
        async function loadProfile() {
            if (!userId) return;
            
            document.getElementById('profile-username').innerText = username;
            document.getElementById('profile-id').innerText = `ID: ${userId}`;
            
            try {
                const response = await fetch(`${BOT_API_URL}/api/get_profile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await response.json();
                
                if (data.success) {
                    userProfile = data.profile;
                    renderProfile(userProfile);
                }
            } catch (e) {
                console.error('Error loading profile:', e);
            }
        }
        
        function renderProfile(profile) {
            document.getElementById('profile-balance').innerText = profile.balance;
            document.getElementById('profile-games').innerText = profile.total_games;
            document.getElementById('profile-wins').innerText = profile.wins;
            document.getElementById('profile-winrate').innerText = profile.winrate + '%';
            document.getElementById('winrate-fill').style.width = profile.winrate + '%';
            
            // Recent games
            const recentList = document.getElementById('recent-games-list');
            if (profile.recent_games && profile.recent_games.length > 0) {
                const gameEmojis = {
                    'slots': '🎰',
                    'roulette': '🎡',
                    'dice': '🎲',
                    'blackjack': '🃏',
                    'bowling': '🎳',
                    'darts': '🎯',
                    'ad_reward': '📺'
                };
                
                recentList.innerHTML = profile.recent_games.map(g => `
                    <div class="recent-game-item">
                        <div class="game-item-left">
                            <span class="game-item-emoji">${gameEmojis[g.game] || '🎮'}</span>
                            <span>${g.game}</span>
                        </div>
                        <span class="game-item-result ${g.result}">
                            ${g.result === 'win' ? '+' + g.win_amount : '-' + g.bet} 💎
                        </span>
                    </div>
                `).join('');
            } else {
                recentList.innerHTML = '<div class="loading-text">Нет сыгранных игр</div>';
            }
        }
        
        // ===== GAME FUNCTIONS (unchanged) =====
        const symbols = ['🍒', '🍋', '💎', '7️⃣', 'BAR'];
        
        function initBetButtons() {
            const betButtons = document.querySelectorAll('.bet-option[data-bet]');
            betButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    currentBet = parseInt(btn.dataset.bet);
                    betButtons.forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                });
            });
            const defaultBetBtn = document.querySelector('.bet-option[data-bet="100"]');
            if (defaultBetBtn) defaultBetBtn.classList.add('selected');
        }
        
        async function loadBalance() {
            if (!userId) return;
            try {
                const response = await fetch(`${BOT_API_URL}/api/get_balance`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                });
                const data = await response.json();
                if (data.success) {
                    balance = data.balance;
                    document.getElementById('balance').innerText = balance;
                }
            } catch (e) {
                console.error('Balance error:', e);
            }
        }
        
        async function sendGameResult(game, bet, win, winAmount, details) {
            if (isLoading) return;
            isLoading = true;
            try {
                const response = await fetch(`${BOT_API_URL}/api/game_result`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, game, bet, win, win_amount: winAmount, details })
                });
                const data = await response.json();
                if (data.success) {
                    balance = data.new_balance;
                    document.getElementById('balance').innerText = balance;
                }
                return data;
            } catch (e) {
                console.error('Game result error:', e);
            } finally {
                isLoading = false;
            }
        }
        
        async function afterGame() {
            await loadBalance();
            backToMenu();
        }
        
        function spinSlots() {
            if (balance < currentBet) {
                document.getElementById('result-message').innerHTML = '❌ Недостаточно средств!';
                document.getElementById('result-message').className = 'result-message lose';
                return;
            }
            const reel1El = document.getElementById('reel1');
            const reel2El = document.getElementById('reel2');
            const reel3El = document.getElementById('reel3');
            const resultDiv = document.getElementById('result-message');
            let spins = 0;
            const interval = setInterval(() => {
                reel1El.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                reel2El.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                reel3El.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                spins++;
                if (spins > 10) clearInterval(interval);
            }, 100);
            setTimeout(async () => {
                const reel1 = symbols[Math.floor(Math.random() * symbols.length)];
                const reel2 = symbols[Math.floor(Math.random() * symbols.length)];
                const reel3 = symbols[Math.floor(Math.random() * symbols.length)];
                reel1El.innerText = reel1;
                reel2El.innerText = reel2;
                reel3El.innerText = reel3;
                let multiplier = 0;
                if (reel1 === reel2 && reel2 === reel3) {
                    if (reel1 === '7️⃣') multiplier = 10;
                    else if (reel1 === '💎') multiplier = 5;
                    else if (reel1 === 'BAR') multiplier = 3;
                    else multiplier = 2;
                } else if (reel1 === reel2 || reel1 === reel3 || reel2 === reel3) {
                    multiplier = 1.5;
                }
                const winAmount = Math.floor(currentBet * multiplier);
                const win = winAmount > 0;
                resultDiv.innerHTML = win ? `🎉 ВЫИГРЫШ: +${winAmount} 💎` : '😞 ПРОИГРЫШ';
                resultDiv.className = `result-message ${win ? 'win' : 'lose'}`;
                await sendGameResult('slots', currentBet, win, winAmount, { reel1, reel2, reel3 });
                await afterGame();
            }, 1100);
        }
        
        let currentRouletteBet = null;
        async function spinRoulette() {
            if (!currentRouletteBet) {
                document.getElementById('result-message').innerHTML = '❌ Сделайте ставку!';
                return;
            }
            if (balance < currentBet) {
                document.getElementById('result-message').innerHTML = '❌ Недостаточно средств!';
                document.getElementById('result-message').className = 'result-message lose';
                return;
            }
            const resultDiv = document.getElementById('result-message');
            const number = Math.floor(Math.random() * 37);
            let color = '';
            if (number === 0) color = 'green';
            else if ([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36].includes(number)) color = 'red';
            else color = 'black';
            const parity = number !== 0 && number % 2 === 0 ? 'even' : 'odd';
            document.getElementById('roulette-result').innerHTML = number;
            let win = false;
            let multiplier = 0;
            if (currentRouletteBet === 'red' && color === 'red') { win = true; multiplier = 2; }
            else if (currentRouletteBet === 'black' && color === 'black') { win = true; multiplier = 2; }
            else if (currentRouletteBet === 'green' && number === 0) { win = true; multiplier = 35; }
            else if (currentRouletteBet === 'even' && parity === 'even') { win = true; multiplier = 2; }
            else if (currentRouletteBet === 'odd' && parity === 'odd') { win = true; multiplier = 2; }
            const winAmount = win ? Math.floor(currentBet * multiplier) : 0;
            resultDiv.innerHTML = win ? `🎉 ВЫИГРЫШ: +${winAmount} 💎` : `😞 ПРОИГРЫШ (${number})`;
            resultDiv.className = `result-message ${win ? 'win' : 'lose'}`;
            await sendGameResult('roulette', currentBet, win, winAmount, { number, bet: currentRouletteBet });
            await afterGame();
        }
        
        let currentDiceBet = null;
        async function rollDice() {
            if (!currentDiceBet) {
                document.getElementById('result-message').innerHTML = '❌ Сделайте ставку!';
                return;
            }
            if (balance < currentBet) {
                document.getElementById('result-message').innerHTML = '❌ Недостаточно средств!';
                document.getElementById('result-message').className = 'result-message lose';
                return;
            }
            const dice1El = document.getElementById('dice1');
            const dice2El = document.getElementById('dice2');
            const resultDiv = document.getElementById('result-message');
            const dice1 = Math.floor(Math.random() * 6) + 1;
            const dice2 = Math.floor(Math.random() * 6) + 1;
            const total = dice1 + dice2;
            const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            dice1El.innerHTML = diceFaces[dice1 - 1];
            dice2El.innerHTML = diceFaces[dice2 - 1];
            let win = false;
            if (currentDiceBet === 'over' && total > 7) win = true;
            if (currentDiceBet === 'under' && total < 7) win = true;
            const winAmount = win ? Math.floor(currentBet * 2) : 0;
            resultDiv.innerHTML = win ? `🎉 ВЫИГРЫШ: +${winAmount} 💎` : `😞 ПРОИГРЫШ (${total})`;
            resultDiv.className = `result-message ${win ? 'win' : 'lose'}`;
            await sendGameResult('dice', currentBet, win, winAmount, { dice1, dice2, total, bet: currentDiceBet });
            await afterGame();
        }
        
        let blackjackDeck = [];
        let playerHand = [];
        let dealerHand = [];
        let gameActive = false;
        function initBlackjackDeck() {
            const deck = [];
            for (let i = 0; i < 4; i++) {
                for (let v of [2,3,4,5,6,7,8,9,10,10,10,10,11]) deck.push(v);
            }
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck;
        }
        function updateBlackjackUI() {
            const playerSum = playerHand.reduce((a,b) => a + b, 0);
            const dealerSum = dealerHand.reduce((a,b) => a + b, 0);
            document.getElementById('player-cards').innerHTML = playerHand.join(', ');
            document.getElementById('player-sum').innerHTML = playerSum;
            document.getElementById('dealer-cards').innerHTML = dealerHand.join(', ');
            document.getElementById('dealer-sum').innerHTML = dealerSum;
        }
        async function endBlackjack(win) {
            if (!gameActive) return;
            gameActive = false;
            const winAmount = win ? Math.floor(currentBet * 2) : 0;
            document.getElementById('result-message').innerHTML = win ? `🎉 ВЫИГРЫШ: +${winAmount} 💎` : `😞 ПРОИГРЫШ`;
            document.getElementById('result-message').className = `result-message ${win ? 'win' : 'lose'}`;
            await sendGameResult('blackjack', currentBet, win, winAmount, { playerHand, dealerHand });
            await afterGame();
        }
        function blackjackHit() {
            if (!gameActive) return;
            if (balance < currentBet) {
                document.getElementById('result-message').innerHTML = '❌ Недостаточно средств!';
                document.getElementById('result-message').className = 'result-message lose';
                return;
            }
            playerHand.push(blackjackDeck.pop());
            updateBlackjackUI();
            if (playerHand.reduce((a,b) => a + b, 0) > 21) endBlackjack(false);
        }
        async function blackjackStand() {
            if (!gameActive) return;
            let dealerSum = dealerHand.reduce((a,b) => a + b, 0);
            while (dealerSum < 17) {
                dealerHand.push(blackjackDeck.pop());
                dealerSum = dealerHand.reduce((a,b) => a + b, 0);
                updateBlackjackUI();
                await new Promise(r => setTimeout(r, 500));
            }
            const playerSum = playerHand.reduce((a,b) => a + b, 0);
            if (dealerSum > 21 || playerSum > dealerSum) endBlackjack(true);
            else endBlackjack(false);
        }
        function startBlackjack() {
            if (balance < currentBet) {
                document.getElementById('result-message').innerHTML = '❌ Недостаточно средств!';
                document.getElementById('result-message').className = 'result-message lose';
                return;
            }
            blackjackDeck = initBlackjackDeck();
            playerHand = [blackjackDeck.pop(), blackjackDeck.pop()];
            dealerHand = [blackjackDeck.pop()];
            gameActive = true;
            updateBlackjackUI();
            document.getElementById('result-message').innerHTML = '';
        }
        
        let currentBowlingBet = null;
        async function playBowling() {
            if (!currentBowlingBet) {
                document.getElementById('result-message').innerHTML = '❌ Сделайте ставку!';
                return;
            }
            if (balance < currentBet) {
                document.getElementById('result-message').innerHTML = '❌ Недостаточно средств!';
                document.getElementById('result-message').className = 'result-message lose';
                return;
            }
            const value = Math.floor(Math.random() * 6) + 1;
            const resultDiv = document.getElementById('result-message');
            let win = false;
            if (currentBowlingBet === 'over' && value > 3) win = true;
            if (currentBowlingBet === 'under' && value < 4) win = true;
            const winAmount = win ? Math.floor(currentBet * 2) : 0;
            resultDiv.innerHTML = win ? `🎉 ВЫИГРЫШ: +${winAmount} 💎` : `😞 ПРОИГРЫШ (${value})`;
            resultDiv.className = `result-message ${win ? 'win' : 'lose'}`;
            await sendGameResult('bowling', currentBet, win, winAmount, { result: value, bet: currentBowlingBet });
            await afterGame();
        }
        
        let currentDartsBet = null;
        async function playDarts() {
            if (!currentDartsBet) {
                document.getElementById('result-message').innerHTML = '❌ Сделайте ставку!';
                return;
            }
            if (balance < currentBet) {
                document.getElementById('result-message').innerHTML = '❌ Недостаточно средств!';
                document.getElementById('result-message').className = 'result-message lose';
                return;
            }
            const value = Math.floor(Math.random() * 6) + 1;
            const isEven = value % 2 === 0;
            const resultDiv = document.getElementById('result-message');
            let win = false;
            if (currentDartsBet === 'even' && isEven) win = true;
            if (currentDartsBet === 'odd' && !isEven) win = true;
            const winAmount = win ? Math.floor(currentBet * 2) : 0;
            resultDiv.innerHTML = win ? `🎉 ВЫИГРЫШ: +${winAmount} 💎` : `😞 ПРОИГРЫШ (${value})`;
            resultDiv.className = `result-message ${win ? 'win' : 'lose'}`;
            await sendGameResult('darts', currentBet, win, winAmount, { result: value, bet: currentDartsBet });
            await afterGame();
        }
        
        function showGame(game) {
            currentGame = game;
            document.getElementById('games-menu').classList.add('hidden');
            document.getElementById('game-area').classList.remove('hidden');
            ['slots','roulette','dice','blackjack','bowling','darts'].forEach(g => {
                document.getElementById(`${g}-game`).classList.add('hidden');
            });
            document.getElementById(`${game}-game`).classList.remove('hidden');
            const titles = { slots:'🎰 СЛОТЫ', roulette:'🎡 РУЛЕТКА', dice:'🎲 КОСТИ', blackjack:'🃏 БЛЭКДЖЕК', bowling:'🎳 БОУЛИНГ', darts:'🎯 ДАРТС' };
            document.getElementById('game-title').innerHTML = titles[game];
            document.getElementById('result-message').innerHTML = '';
        }
        
        function backToMenu() {
            document.getElementById('games-menu').classList.remove('hidden');
            document.getElementById('game-area').classList.add('hidden');
            currentGame = null;
        }
        
        // Event listeners
        document.querySelectorAll('.game-card').forEach(card => {
            card.addEventListener('click', () => showGame(card.dataset.game));
        });
        document.getElementById('back-to-menu').addEventListener('click', backToMenu);
        document.querySelectorAll('[data-roulette]').forEach(btn => {
            btn.addEventListener('click', () => {
                currentRouletteBet = btn.dataset.roulette;
                document.querySelectorAll('[data-roulette]').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            });
        });
        document.querySelectorAll('[data-dice]').forEach(btn => {
            btn.addEventListener('click', () => {
                currentDiceBet = btn.dataset.dice;
                document.querySelectorAll('[data-dice]').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            });
        });
        document.querySelectorAll('[data-bowling]').forEach(btn => {
            btn.addEventListener('click', () => {
                currentBowlingBet = btn.dataset.bowling;
                document.querySelectorAll('[data-bowling]').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            });
        });
        document.querySelectorAll('[data-darts]').forEach(btn => {
            btn.addEventListener('click', () => {
                currentDartsBet = btn.dataset.darts;
                document.querySelectorAll('[data-darts]').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
            });
        });
        document.getElementById('spin-btn').addEventListener('click', spinSlots);
        document.getElementById('roulette-spin-btn').addEventListener('click', spinRoulette);
        document.getElementById('dice-spin-btn').addEventListener('click', rollDice);
        document.getElementById('bj-start-btn').addEventListener('click', startBlackjack);
        document.getElementById('bj-hit').addEventListener('click', blackjackHit);
        document.getElementById('bj-stand').addEventListener('click', blackjackStand);
        document.getElementById('bowling-spin-btn').addEventListener('click', playBowling);
        document.getElementById('darts-spin-btn').addEventListener('click', playDarts);
        document.getElementById('earn-coins-btn').addEventListener('click', () => {
            tg.showAlert('📺 Реклама временно недоступна. Попробуйте позже.');
        });
        
        initBetButtons();
        loadBalance();
        tg.ready();
    </script>
</body>
</html>
