<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Game Bar — Играй и выигрывай</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent}
        :root{--bg-primary:#1a1a2e;--bg-secondary:#16213e;--accent:#f7971e;--accent2:#ffd200;--win:#4CAF50;--lose:#ff6b6b;--card-bg:rgba(255,255,255,0.03);--border:rgba(255,255,255,0.08);--shadow-3d:0 8px 32px rgba(0,0,0,0.4),0 2px 8px rgba(0,0,0,0.3);--shadow-btn:0 6px 20px rgba(247,151,30,0.4),inset 0 1px 0 rgba(255,255,255,0.2)}
        @keyframes bgPulse{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        @keyframes glow{0%,100%{box-shadow:0 0 20px rgba(247,151,30,0.2)}50%{box-shadow:0 0 40px rgba(247,151,30,0.4)}}
        @keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(0.95)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes popIn{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
        @keyframes dice-roll{0%{transform:rotate(0deg) scale(0.5);opacity:0}50%{transform:rotate(180deg) scale(1.2);opacity:1}100%{transform:rotate(360deg) scale(1);opacity:1}}
        @keyframes cardDeal{0%{transform:translateX(-40px) rotate(-10deg);opacity:0}100%{transform:translateX(0) rotate(0);opacity:1}}
        @keyframes cardDealDealer{0%{transform:translateX(40px) rotate(10deg);opacity:0}100%{transform:translateX(0) rotate(0);opacity:1}}
        @keyframes pulseResult{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
        @keyframes bowlingTopView{0%{transform:translate(0,0) rotate(0deg);opacity:1}100%{transform:translate(0,280px) rotate(180deg);opacity:1}}
        @keyframes pinScatter{0%{transform:translate(0,0) rotate(0deg) scale(1)}100%{transform:translate(var(--sx),var(--sy)) rotate(var(--sr)) scale(0.7)}}
        @keyframes impactRing{0%{transform:translate(-50%,-50%) scale(0);opacity:0.8;border-width:8px}100%{transform:translate(-50%,-50%) scale(3);opacity:0;border-width:1px}}
        @keyframes dartboardBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
        @keyframes cameraZoom{0%{transform:scale(1)}100%{transform:scale(1.8)}}
        @keyframes dartFlyIn{0%{transform:translate(60px,-80px) rotate(-45deg) scale(0);opacity:0}70%{transform:translate(5px,-5px) rotate(-5deg) scale(1.1);opacity:1}100%{transform:translate(0,0) rotate(0deg) scale(1);opacity:1}}
        @keyframes rippleOut{0%{transform:translate(-50%,-50%) scale(0);opacity:0.6}100%{transform:translate(-50%,-50%) scale(2.5);opacity:0}}
        @keyframes dartMiss{0%{transform:translate(0,0) rotate(-45deg);opacity:1}40%{transform:translate(30px,20px) rotate(20deg);opacity:1}100%{transform:translate(80px,-60px) rotate(180deg);opacity:0}}
        body{background:linear-gradient(135deg,#0a0a1a,#12122a 30%,#1a1a3a 60%,#0d0d28 100%);background-size:400% 400%;animation:bgPulse 12s ease infinite;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:white;min-height:100vh;display:flex;justify-content:center;align-items:center;overflow-x:hidden}
        body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 20% 50%,rgba(247,151,30,0.03) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(255,210,0,0.03) 0%,transparent 50%),radial-gradient(circle at 50% 80%,rgba(76,175,80,0.03) 0%,transparent 50%);pointer-events:none;z-index:0}
        .game-container{width:100%;max-width:500px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1}
        .header{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(180deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border-radius:24px;padding:16px 20px;margin-bottom:16px;border:1px solid var(--border);box-shadow:var(--shadow-3d);animation:cardIn 0.6s ease}
        .balance{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.5);padding:10px 18px;border-radius:30px;box-shadow:inset 0 2px 4px rgba(0,0,0,0.3)}
        .balance-icon{font-size:22px;filter:drop-shadow(0 0 6px rgba(255,215,0,0.6));animation:float 3s ease-in-out infinite}
        .balance-amount{font-size:22px;font-weight:800;background:linear-gradient(180deg,#ffd700,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .username{font-size:13px;opacity:0.6;font-weight:500}
        .daily-bonus-banner{background:linear-gradient(135deg,rgba(247,151,30,0.15),rgba(255,210,0,0.1));border:1px solid rgba(247,151,30,0.3);border-radius:18px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;animation:glow 2s ease-in-out infinite;cursor:pointer;box-shadow:0 4px 16px rgba(247,151,30,0.15)}
        .daily-bonus-banner:active{transform:scale(0.97)}.daily-bonus-banner .db-info{display:flex;align-items:center;gap:10px}.daily-bonus-banner .db-icon{font-size:28px}.daily-bonus-banner .db-text{font-size:13px;font-weight:600}.daily-bonus-banner .db-btn{background:linear-gradient(180deg,#f7971e,#e65100);color:white;border:none;padding:10px 18px;border-radius:25px;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 4px 12px rgba(247,151,30,0.3)}
        .tab-nav{display:flex;gap:8px;margin-bottom:16px;background:var(--card-bg);border-radius:20px;padding:6px;border:1px solid var(--border);box-shadow:var(--shadow-3d)}
        .tab-btn{flex:1;padding:12px 6px;border:none;background:transparent;color:rgba(255,255,255,0.45);border-radius:16px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:4px}
        .tab-btn.active{background:linear-gradient(180deg,rgba(247,151,30,0.25),rgba(255,210,0,0.15));color:white;box-shadow:0 4px 12px rgba(247,151,30,0.2)}
        .tab-content{display:none;flex:1}.tab-content.active{display:block;animation:cardIn 0.4s ease}
        .games-menu{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
        .game-card{background:linear-gradient(180deg,rgba(42,42,74,0.9),rgba(26,26,58,0.95));border-radius:22px;padding:22px 10px;text-align:center;cursor:pointer;transition:all 0.2s;border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,0.3)}.game-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent)}.game-card:active{transform:scale(0.93)}.game-emoji{font-size:44px;margin-bottom:10px;filter:drop-shadow(0 6px 12px rgba(0,0,0,0.4))}.game-name{font-size:13px;font-weight:600;opacity:0.8}
        .game-area{background:rgba(0,0,0,0.35);border-radius:24px;padding:24px;margin-bottom:16px;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow-3d);min-height:340px;position:relative;overflow:hidden}
        .game-title{font-size:24px;font-weight:800;margin-bottom:18px;text-shadow:0 2px 8px rgba(0,0,0,0.5)}
        .slot-reels{display:flex;justify-content:center;gap:14px;margin:24px 0}
        .reel{width:75px;height:75px;background:linear-gradient(180deg,rgba(255,255,255,0.1),rgba(0,0,0,0.4));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:42px;transition:all 0.1s;border:2px solid var(--border);box-shadow:inset 0 2px 4px rgba(0,0,0,0.5)}.reel.spinning{filter:blur(4px)}.reel.win-anim{animation:popIn 0.5s ease;border-color:#ffd700}
        .spin-btn{background:linear-gradient(180deg,#f7971e,#e65100);border:none;color:white;font-weight:800;padding:16px 36px;border-radius:35px;font-size:17px;cursor:pointer;margin:14px 5px 5px 5px;box-shadow:var(--shadow-btn)}.spin-btn::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.2),transparent)}.spin-btn:active{transform:scale(0.94)}
        .get-coins-btn{background:linear-gradient(180deg,#4CAF50,#2E7D32);width:100%;border:none;color:white;font-weight:800;padding:16px;border-radius:35px;font-size:15px;cursor:pointer;margin-bottom:16px}.get-coins-btn:active{transform:scale(0.94)}
        .result-message{font-size:18px;margin-top:18px;padding:16px;border-radius:16px;background:rgba(0,0,0,0.4);font-weight:700;z-index:2;animation:pulseResult 0.5s ease 2}.win{color:#ffd700}.lose{color:#ff6b6b}
        .bet-buttons{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:18px 0}
        .bet-option{background:linear-gradient(180deg,rgba(255,255,255,0.12),rgba(255,255,255,0.04));border:1px solid rgba(255,255,255,0.15);color:white;padding:12px 18px;border-radius:30px;font-size:14px;font-weight:600;cursor:pointer}.bet-option.selected{background:linear-gradient(180deg,#f7971e,#e65100);color:white;font-weight:800}
        .back-btn{background:linear-gradient(180deg,rgba(255,255,255,0.1),rgba(255,255,255,0.03));border:1px solid rgba(255,255,255,0.12);color:white;padding:14px 24px;border-radius:30px;cursor:pointer;margin-top:18px;font-size:14px;font-weight:600}.hidden{display:none!important}
        .roulette-wheel-container{position:relative;width:240px;height:240px;margin:24px auto}.roulette-outer{width:240px;height:240px;border-radius:50%;border:8px solid #5d4037;background:#3e2723;box-shadow:0 0 30px rgba(0,0,0,0.6),inset 0 0 20px rgba(0,0,0,0.4);position:relative;overflow:hidden}.roulette-ring{position:absolute;top:50%;left:50%;width:200px;height:200px;margin-left:-100px;margin-top:-100px;border-radius:50%;transition:transform 5s cubic-bezier(0.17,0.89,0.32,1.25)}.roulette-sector{position:absolute;top:50%;left:50%;width:100px;height:100px;margin-left:-100px;margin-top:-100px;transform-origin:100% 100%;display:flex;align-items:flex-start;justify-content:center;padding-top:8px;font-size:11px;font-weight:700;color:#fff}.roulette-ball{position:absolute;width:16px;height:16px;background:radial-gradient(circle at 40% 40%,#fff,#ccc);border-radius:50%;top:50%;left:50%;margin-left:-8px;margin-top:-108px;box-shadow:0 0 10px rgba(255,255,255,0.8);transition:all 5s cubic-bezier(0.17,0.89,0.32,1.25);z-index:5}.roulette-center{position:absolute;top:50%;left:50%;width:40px;height:40px;margin-left:-20px;margin-top:-20px;background:radial-gradient(circle,#8d6e63,#5d4037);border-radius:50%;border:3px solid #3e2723;z-index:3}.roulette-result-num{font-size:44px;font-weight:800;min-height:55px;margin:8px 0}
        .card-row{display:flex;align-items:center;gap:8px;justify-content:center;min-height:60px;margin:6px 0}.card-row .clabel{font-size:12px;opacity:0.5;width:50px;text-align:right}.card-slot{width:48px;height:68px;background:linear-gradient(180deg,rgba(255,255,255,0.1),rgba(0,0,0,0.3));border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;border:2px solid var(--border);margin:0 2px;transition:all 0.4s}.card-slot.new-card{animation:cardDeal 0.4s ease}.card-slot.dealer-card{animation:cardDealDealer 0.4s ease}
        .bowling-top-view{position:relative;width:100%;height:320px;margin:10px 0;background:linear-gradient(180deg,rgba(62,39,35,0.9) 0%,rgba(93,64,55,0.8) 30%,rgba(120,85,70,0.6) 100%);border-radius:16px;overflow:hidden;border:2px solid rgba(255,255,255,0.08);box-shadow:inset 0 0 40px rgba(0,0,0,0.4)}
        .bowling-lane-lines{position:absolute;top:0;left:50%;transform:translateX(-50%);width:40px;height:100%;display:flex;flex-direction:column;align-items:center;gap:20px;padding-top:30px;opacity:0.15}
        .bowling-lane-lines span{width:3px;height:30px;background:#fff;border-radius:2px}
        .bowling-ball-top{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:50px;filter:drop-shadow(0 10px 20px rgba(0,0,0,0.6));z-index:5;transition:none}
        .bowling-pins-triangle{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:4}
        .bowling-pins-row-new{display:flex;gap:12px;justify-content:center}
        .bowling-pin-new{font-size:26px;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.5));transition:none}
        .impact-ring{position:absolute;width:40px;height:40px;border-radius:50%;border:4px solid rgba(255,215,0,0.6);pointer-events:none;z-index:6;display:none}
        .darts-scene-new{position:relative;width:100%;height:300px;margin:10px 0;overflow:hidden;border-radius:16px;background:rgba(0,0,0,0.2)}
        .dartboard-breathe{width:160px;height:160px;border-radius:50%;background:conic-gradient(#1a1a1a 0deg 30deg,#c0392b 30deg 60deg,#1a1a1a 60deg 90deg,#27ae60 90deg 120deg,#1a1a1a 120deg 150deg,#c0392b 150deg 180deg,#1a1a1a 180deg 210deg,#27ae60 210deg 240deg,#1a1a1a 240deg 270deg,#c0392b 270deg 300deg,#1a1a1a 300deg 330deg,#27ae60 330deg 360deg);border:5px solid #555;box-shadow:0 10px 40px rgba(0,0,0,0.6);margin:20px auto;animation:dartboardBreathe 2s ease-in-out infinite;position:relative}
        .dartboard-breathe .ring1{position:absolute;top:10px;left:10px;right:10px;bottom:10px;border-radius:50%;border:1px solid rgba(255,255,255,0.12)}.dartboard-breathe .ring2{position:absolute;top:45px;left:45px;right:45px;bottom:45px;border-radius:50%;border:1px solid rgba(255,255,255,0.1)}.dartboard-breathe .bull-inner{position:absolute;top:50%;left:50%;width:32px;height:32px;margin-left:-16px;margin-top:-16px;background:radial-gradient(circle,#e74c3c,#8B0000);border-radius:50%;border:2px solid #1a1a1a;box-shadow:0 0 15px rgba(231,76,60,0.4)}
        .dart-fly-new{position:absolute;font-size:44px;filter:drop-shadow(0 6px 10px rgba(0,0,0,0.5));z-index:5;display:none}
        .ripple{position:absolute;width:20px;height:20px;border-radius:50%;border:3px solid rgba(255,215,0,0.5);pointer-events:none;z-index:6;display:none}
        .profile-header{text-align:center;padding:24px;background:var(--card-bg);border-radius:24px;margin-bottom:16px;border:1px solid var(--border);box-shadow:var(--shadow-3d)}.profile-avatar{width:90px;height:90px;border-radius:50%;background:linear-gradient(180deg,#f7971e,#e65100);display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 14px;box-shadow:0 10px 30px rgba(247,151,30,0.4);animation:float 4s ease-in-out infinite}.profile-username{font-size:22px;font-weight:800}.profile-id{font-size:12px;opacity:0.4}
        .stat-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}.stat-card{background:var(--card-bg);border-radius:18px;padding:18px;text-align:center;border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,0.2)}.stat-card .stat-icon{font-size:30px;margin-bottom:6px}.stat-card .stat-value{font-size:24px;font-weight:800;background:linear-gradient(180deg,#fff,#aaa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.stat-card .stat-label{font-size:11px;opacity:0.5;text-transform:uppercase;letter-spacing:1px;margin-top:4px}.winrate-bar{background:rgba(255,255,255,0.08);border-radius:10px;height:8px;margin-top:10px;overflow:hidden}.winrate-fill{background:linear-gradient(90deg,var(--accent),var(--accent2));height:100%;border-radius:10px;transition:width 0.5s}
        .games-section{background:var(--card-bg);border-radius:24px;padding:18px;margin-bottom:16px;border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,0.2)}.section-title{font-size:13px;font-weight:700;opacity:0.5;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px}
        .recent-game-item,.friend-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:14px}.recent-game-item:last-child,.friend-item:last-child{border-bottom:none}.game-item-left,.f-info{display:flex;align-items:center;gap:10px}.game-item-emoji{font-size:26px}.game-item-result{font-weight:800;font-size:14px}.game-item-result.win{color:var(--win)}.game-item-result.lose{color:var(--lose)}
        .achievement-card{display:flex;align-items:center;gap:14px;padding:14px;background:var(--card-bg);border-radius:16px;margin-bottom:10px;border:1px solid var(--border)}.achievement-card.earned{border-color:rgba(247,151,30,0.4);background:rgba(247,151,30,0.06)}.achievement-card.locked{opacity:0.4}.achievement-icon{font-size:36px;min-width:48px;text-align:center}.achievement-info{flex:1}.achievement-name{font-size:14px;font-weight:700}.achievement-desc{font-size:11px;opacity:0.5}.achievement-progress{font-size:11px;font-weight:700;margin-top:4px}.achievement-progress-bar{background:rgba(255,255,255,0.08);border-radius:6px;height:5px;margin-top:5px;overflow:hidden}.achievement-progress-fill{background:linear-gradient(90deg,var(--accent),var(--accent2));height:100%;border-radius:6px;transition:width 0.5s}
        @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn 0.4s ease}
        .payment-banner{background:linear-gradient(135deg,rgba(247,151,30,0.2),rgba(255,210,0,0.1));border:1px solid rgba(247,151,30,0.3);border-radius:18px;padding:14px;margin-bottom:16px;text-align:center}
        .referral-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}.referral-card{background:var(--card-bg);border-radius:18px;padding:18px;text-align:center;border:1px solid var(--border)}.referral-link-box{background:rgba(0,0,0,0.35);border-radius:18px;padding:16px;margin-bottom:16px;text-align:center;border:1px solid var(--border)}.ref-link{font-size:11px;word-break:break-all;opacity:0.5;margin:10px 0;padding:10px;background:rgba(0,0,0,0.4);border-radius:10px}.friend-item .f-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(180deg,#f7971e,#e65100);display:flex;align-items:center;justify-content:center;font-size:18px}
        .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:100;justify-content:center;align-items:center;padding:20px;backdrop-filter:blur(4px)}.modal-overlay.active{display:flex}
        .modal{background:linear-gradient(180deg,#1e1e3a,#12122a);border-radius:24px;padding:28px;width:100%;max-width:400px;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,0.5);animation:modalIn 0.3s ease}@keyframes modalIn{from{transform:scale(0.85);opacity:0}to{transform:scale(1);opacity:1}}
        .modal-btn{width:100%;padding:16px;border:none;border-radius:16px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px}.modal-btn.gold{background:linear-gradient(180deg,#f7971e,#e65100);color:white}.modal-btn.green{background:linear-gradient(180deg,#4CAF50,#2E7D32);color:white}.modal-btn.red{background:rgba(255,255,255,0.08);color:white;border:1px solid rgba(255,255,255,0.15)}
        input[type="text"]{width:100%;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:white;font-size:15px;margin-bottom:18px;outline:none;text-align:center}input[type="text"]::placeholder{color:rgba(255,255,255,0.25)}
        @media(max-width:400px){.games-menu{gap:8px}.game-emoji{font-size:34px}.game-name{font-size:11px}.game-card{padding:16px 6px}.reel{width:60px;height:60px;font-size:34px}.bet-option{padding:10px 14px;font-size:13px}.tab-btn{font-size:11px;padding:10px 4px}}
    </style>
</head>
<body>
    <div class="game-container" id="app">
        <div class="header"><div class="balance"><span class="balance-icon">💎</span><span class="balance-amount" id="balance">0</span></div><div class="username" id="username">Игрок</div></div>
        <div class="daily-bonus-banner hidden" id="daily-bonus-banner"><div class="db-info"><span class="db-icon">🎁</span><div><div class="db-text">Ежедневный бонус</div><div style="font-size:10px;opacity:0.5" id="db-streak-text">День 1</div></div></div><button class="db-btn" id="claim-daily-btn">+10 💎</button></div>
        <div class="tab-nav"><button class="tab-btn active" data-tab="games">🎮 Игры</button><button class="tab-btn" data-tab="profile">👤 Профиль</button><button class="tab-btn" data-tab="referral">👥 Друзья</button></div>
        <div class="payment-banner hidden" id="pending-payment-banner"><div class="banner-text">⏳ Ожидающий платёж!</div><button class="modal-btn gold" id="check-pending-payment-btn" style="font-size:14px;padding:12px;">🔄 Проверить</button></div>
        <div class="tab-content active" id="tab-games">

    <script>
        const tg=window.Telegram.WebApp;tg.expand();tg.enableClosingConfirmation()
        const BOT_API_URL='https://game-bar-bot.onrender.com';const webAppUser=tg.initDataUnsafe?.user
        let currentGame=null,currentBet=100,balance=0,isLoading=false,userProfile=null,selectedAmount=null
        const WIN_RATE=0.50;const GAME_RESULT_DELAY=3000
        function getUserId(){if(webAppUser&&webAppUser.id)return webAppUser.id;const p=new URLSearchParams(window.location.search);const uid=p.get('user_id');return uid?parseInt(uid):null}
        const userId=getUserId();const username=webAppUser?.username||webAppUser?.first_name||'Игрок';document.getElementById('username').innerText=username
        function spawnWinCoins(count=8){for(let i=0;i<count;i++){const c=document.createElement('div');c.style.cssText=`position:fixed;pointer-events:none;font-size:24px;animation:coinRain ${1.5+Math.random()*2}s ease-in forwards;left:${Math.random()*100}%;top:-20px;z-index:50`;c.innerText='💎';document.body.appendChild(c);setTimeout(()=>c.remove(),3500)}}
        async function checkPendingPaymentOnLoad(){if(!userId)return;const ppId=localStorage.getItem('pending_payment_id'),ppUid=localStorage.getItem('pending_user_id');if(ppId&&ppUid&&parseInt(ppUid)===userId){document.getElementById('pending-payment-banner').classList.remove('hidden');try{const r=await fetch(`${BOT_API_URL}/api/check_payment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId,payment_id:ppId})});const d=await r.json();if(d.status==='paid'||d.status==='already_credited'){document.getElementById('pending-payment-banner').classList.add('hidden');localStorage.removeItem('pending_payment_id');localStorage.removeItem('pending_user_id');await loadBalance()}}catch(e){}}}
        document.getElementById('check-pending-payment-btn').addEventListener('click',async()=>{const btn=document.getElementById('check-pending-payment-btn');btn.disabled=true;btn.innerText='⏳';const ppId=localStorage.getItem('pending_payment_id');try{const r=await fetch(`${BOT_API_URL}/api/check_payment`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId,payment_id:ppId})});const d=await r.json();if(d.status==='paid'||d.status==='already_credited'){document.getElementById('pending-payment-banner').classList.add('hidden');localStorage.removeItem('pending_payment_id');localStorage.removeItem('pending_user_id');await loadBalance();tg.showAlert('✅')}else{tg.showAlert(d.message||'⏳')}}catch(e){}finally{btn.disabled=false;btn.innerText='🔄'}})
        async function loadDailyBonus(){if(!userId)return;try{const r=await fetch(`${BOT_API_URL}/api/daily_bonus_status`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId})});const d=await r.json();if(d.success){const s=d.status;if(s.can_claim){document.getElementById('daily-bonus-banner').classList.remove('hidden');document.getElementById('claim-daily-btn').innerText=`+${s.next_bonus} 💎`}}}catch(e){}}
        document.getElementById('claim-daily-btn').addEventListener('click',async()=>{const btn=document.getElementById('claim-daily-btn');btn.disabled=true;btn.innerText='⏳';try{const r=await fetch(`${BOT_API_URL}/api/daily_bonus`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId})});const d=await r.json();if(d.success){balance=d.new_balance;document.getElementById('balance').innerText=balance;document.getElementById('daily-bonus-banner').classList.add('hidden');tg.showAlert(`+${d.bonus}!`)}else{tg.showAlert('Уже')}}catch(e){}finally{btn.disabled=false;btn.innerText='+10 💎'}})
        function showNoBalance(){document.getElementById('no-balance-modal').classList.add('active')}
        document.getElementById('go-buy-coins-btn').addEventListener('click',()=>{document.getElementById('no-balance-modal').classList.remove('active');document.getElementById('buy-modal').classList.add('active')})
        document.getElementById('close-no-balance-modal').addEventListener('click',()=>document.getElementById('no-balance-modal').classList.remove('active'))
        document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{const t=b.dataset.tab;document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(`tab-${t}`).classList.add('active')}))
        document.getElementById('get-coins-btn').addEventListener('click',()=>document.getElementById('coins-modal').classList.add('active'))
        document.getElementById('close-coins-modal').addEventListener('click',()=>document.getElementById('coins-modal').classList.remove('active'))
        document.getElementById('buy-coins-btn').addEventListener('click',()=>{document.getElementById('coins-modal').classList.remove('active');document.getElementById('buy-modal').classList.add('active')})
        document.getElementById('close-buy-modal').addEventListener('click',()=>{document.getElementById('buy-modal').classList.remove('active');selectedAmount=null;document.getElementById('confirm-purchase-btn').disabled=true})
        document.querySelectorAll('.price-item').forEach(i=>i.addEventListener('click',()=>{document.querySelectorAll('.price-item').forEach(x=>x.classList.remove('selected'));i.classList.add('selected');selectedAmount={points:parseInt(i.dataset.amount),price:parseFloat(i.dataset.price)};document.getElementById('confirm-purchase-btn').disabled=false}))
        document.getElementById('confirm-purchase-btn').addEventListener('click',async()=>{if(!selectedAmount)return;const btn=document.getElementById('confirm-purchase-btn');btn.disabled=true;btn.innerText='⏳';try{const r=await fetch(`${BOT_API_URL}/api/create_invoice`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId,amount_points:selectedAmount.points})});const d=await r.json();if(d.success&&d.invoice_url){localStorage.setItem('pending_payment_id',d.payment_id);localStorage.setItem('pending_user_id',userId);document.getElementById('buy-modal').classList.remove('active');document.getElementById('pending-payment-banner').classList.remove('hidden');tg.openLink(d.invoice_url)}else{tg.showAlert('❌')}}catch(e){}finally{btn.innerText='💳';btn.disabled=true;selectedAmount=null}})
        document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('active')}))

        const symbols=['🍒','🍋','💎','7️⃣','BAR'];const cardSuits=['♠️','♥️','♦️','♣️']
        function initBetButtons(){document.querySelectorAll('.bet-option[data-bet]').forEach(b=>b.addEventListener('click',()=>{currentBet=parseInt(b.dataset.bet);document.querySelectorAll('.bet-option[data-bet]').forEach(x=>x.classList.remove('selected'));b.classList.add('selected')}));document.querySelector('.bet-option[data-bet="100"]')?.classList.add('selected')}
        async function loadBalance(){if(!userId)return;try{const r=await fetch(`${BOT_API_URL}/api/get_balance`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId})});const d=await r.json();if(d.success){balance=d.balance;document.getElementById('balance').innerText=balance}}catch(e){}}
        async function sendGameResult(game,bet,win,wa,details){if(isLoading)return;isLoading=true;try{const r=await fetch(`${BOT_API_URL}/api/game_result`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:userId,game,bet,win,win_amount:wa,details})});const d=await r.json();if(d.success){balance=d.new_balance;document.getElementById('balance').innerText=balance}return d}catch(e){}finally{isLoading=false}}
        async function afterGame(win){await loadBalance();setTimeout(()=>backToMenu(),GAME_RESULT_DELAY)}
        function showGame(game){currentGame=game;document.getElementById('games-menu').classList.add('hidden');document.getElementById('game-area').classList.remove('hidden');['slots','roulette','dice','blackjack','bowling','darts'].forEach(g=>document.getElementById(`${g}-game`).classList.add('hidden'));document.getElementById(`${game}-game`).classList.remove('hidden');const t={slots:'🎰 СЛОТЫ',roulette:'🎡 РУЛЕТКА',dice:'🎲 КОСТИ',blackjack:'🃏 БЛЭКДЖЕК',bowling:'🎳 БОУЛИНГ',darts:'🎯 ДАРТС'};document.getElementById('game-title').innerHTML=t[game];document.getElementById('result-message').innerHTML='';document.getElementById('result-message').className='result-message'}
        function backToMenu(){document.getElementById('games-menu').classList.remove('hidden');document.getElementById('game-area').classList.add('hidden');currentGame=null}

        // 🎰 СЛОТЫ
        let slotSpinning=false;function spinSlots(){if(balance<currentBet){showNoBalance();return}if(slotSpinning)return;slotSpinning=true;const r1=document.getElementById('reel1'),r2=document.getElementById('reel2'),r3=document.getElementById('reel3'),rd=document.getElementById('result-message'),sb=document.getElementById('spin-btn');sb.disabled=true;r1.classList.add('spinning');r2.classList.add('spinning');r3.classList.add('spinning');const sd=1200,tf=24,fi=sd/tf;let f=0;const iv=setInterval(()=>{r1.innerText=symbols[Math.floor(Math.random()*5)];r2.innerText=symbols[Math.floor(Math.random()*5)];r3.innerText=symbols[Math.floor(Math.random()*5)];f++;if(f>=tf-3)r1.classList.remove('spinning');if(f>=tf-2)r2.classList.remove('spinning');if(f>=tf){r3.classList.remove('spinning');clearInterval(iv);const a=symbols[Math.floor(Math.random()*5)],b=symbols[Math.floor(Math.random()*5)],c=symbols[Math.floor(Math.random()*5)];r1.innerText=a;r2.innerText=b;r3.innerText=c;const win=Math.random()<WIN_RATE;let wa=0;if(win){let m=2;if(a===b&&b===c){if(a==='7️⃣')m=10;else if(a==='💎')m=5;else if(a==='BAR')m=3}else if(a===b||a===c||b===c)m=1.5;wa=Math.floor(currentBet*m);r1.classList.add('win-anim');r2.classList.add('win-anim');r3.classList.add('win-anim');spawnWinCoins(8)}rd.innerHTML=win?`🎉 ВЫИГРЫШ: +${wa} 💎`:'😞 ПРОИГРЫШ';rd.className=`result-message ${win?'win':'lose'}`;sendGameResult('slots',currentBet,win,wa,{}).then(()=>{afterGame(win);sb.disabled=false;slotSpinning=false})}},fi)}

        // 🎡 РУЛЕТКА
        let crb=null,rouletteSpinning=false,rNumbers=[];function buildRouletteRing(){const ring=document.getElementById('roulette-ring');ring.innerHTML='';const reds=new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);rNumbers=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];const total=rNumbers.length;const sliceDeg=360/total;rNumbers.forEach((num,i)=>{const sector=document.createElement('div');sector.className='roulette-sector';const startAngle=i*sliceDeg-90;const bg=num===0?'#27ae60':reds.has(num)?'#e74c3c':'#2c3e50';sector.style.cssText=`transform:rotate(${startAngle}deg) skewY(${90-sliceDeg}deg);background:${bg};clip-path:polygon(0 0,100% 0,100% 100%)`;sector.innerText=num;ring.appendChild(sector)})}
        async function spinRoulette(){if(!crb){document.getElementById('result-message').innerHTML='❌ Ставка!';return}if(balance<currentBet){showNoBalance();return}if(rouletteSpinning)return;rouletteSpinning=true;if(!rNumbers.length)buildRouletteRing();const ring=document.getElementById('roulette-ring'),ball=document.getElementById('roulette-ball-anim'),rd=document.getElementById('result-message'),rr=document.getElementById('roulette-result-display'),sb=document.getElementById('roulette-spin-btn');sb.disabled=true;ring.style.transition='none';ring.style.transform='rotate(0deg)';ball.style.transition='none';ball.style.transform='';setTimeout(()=>{ring.style.transition='transform 5s cubic-bezier(0.17,0.89,0.32,1.25)';ball.style.transition='all 5s cubic-bezier(0.17,0.89,0.32,1.25)';const n=Math.floor(Math.random()*37);const idx=rNumbers.indexOf(n);const extra=360*4;const sliceDeg=360/rNumbers.length;const wheelAngle=-(idx*sliceDeg)-sliceDeg/2-extra;const ballAngle=wheelAngle;ring.style.transform=`rotate(${wheelAngle}deg)`;ball.style.transform=`rotate(${-ballAngle}deg)`;rr.innerHTML='🎡';setTimeout(()=>{const win=Math.random()<WIN_RATE;let wa=0;if(win){let m=2;if(crb==='green'&&n===0)m=35;wa=Math.floor(currentBet*m);spawnWinCoins(6)}rr.innerHTML=`${n}`;rd.innerHTML=win?`🎉 ВЫИГРЫШ: +${wa} 💎`:`😞 ПРОИГРЫШ (${n})`;rd.className=`result-message ${win?'win':'lose'}`;sendGameResult('roulette',currentBet,win,wa,{}).then(()=>{afterGame(win);sb.disabled=false;rouletteSpinning=false})},5200)},100)}

        // 🎲 КОСТИ
        let cdb=null,diceSpinning=false;async function rollDice(){if(!cdb){document.getElementById('result-message').innerHTML='❌ Ставка!';return}if(balance<currentBet){showNoBalance();return}if(diceSpinning)return;diceSpinning=true;const d1El=document.getElementById('dice1'),d2El=document.getElementById('dice2'),rd=document.getElementById('result-message'),sb=document.getElementById('dice-spin-btn');sb.disabled=true;d1El.style.animation='dice-roll 0.8s ease-out';d2El.style.animation='dice-roll 0.8s ease-out';const df=['⚀','⚁','⚂','⚃','⚄','⚅'];let c=0;const iv=setInterval(()=>{d1El.innerText=df[Math.floor(Math.random()*6)];d2El.innerText=df[Math.floor(Math.random()*6)];c++;if(c>=12)clearInterval(iv)},60);setTimeout(()=>{d1El.style.animation='';d2El.style.animation='';const d1=Math.floor(Math.random()*6)+1,d2=Math.floor(Math.random()*6)+1,t=d1+d2;d1El.innerText=df[d1-1];d2El.innerText=df[d2-1];const win=Math.random()<WIN_RATE;const wa=win?Math.floor(currentBet*2):0;if(win){d1El.style.transform='scale(1.2)';d2El.style.transform='scale(1.2)';setTimeout(()=>{d1El.style.transform='';d2El.style.transform=''},300);spawnWinCoins(6)}rd.innerHTML=win?`🎉 ВЫИГРЫШ: +${wa} 💎`:`😞 ПРОИГРЫШ (${t})`;rd.className=`result-message ${win?'win':'lose'}`;sendGameResult('dice',currentBet,win,wa,{}).then(()=>{afterGame(win);sb.disabled=false;diceSpinning=false})},800)}

        // 🃏 БЛЭКДЖЕК
        let bjd=[],ph=[],dh=[],ga=false;function cn(v){if(v===11)return'A';if(v===10)return['K','Q','J','10'][Math.floor(Math.random()*4)];return String(v)}function rc(){const pc=document.getElementById('player-cards'),dc=document.getElementById('dealer-cards');pc.innerHTML=ph.map((v,i)=>`<span class="card-slot ${i===ph.length-1?'new-card':''}" style="animation-delay:${i*0.2}s">${cardSuits[i%4]}${cn(v)}</span>`).join('');dc.innerHTML=dh.map((v,i)=>`<span class="card-slot dealer-card" style="animation-delay:${i*0.2}s">${cardSuits[i%4]}${cn(v)}</span>`).join('');document.getElementById('player-sum').innerText=ph.reduce((a,b)=>a+b,0);document.getElementById('dealer-sum').innerText=dh.reduce((a,b)=>a+b,0)}function ibd(){const d=[];for(let i=0;i<4;i++){for(let v of[2,3,4,5,6,7,8,9,10,10,10,10,11])d.push(v)}for(let i=d.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[d[i],d[j]]=[d[j],d[i]]}return d}
        async function ebj(hw){if(!ga)return;ga=false;const win=hw&&Math.random()<WIN_RATE;const wa=win?Math.floor(currentBet*2):0;document.getElementById('result-message').innerHTML=win?`🎉 ВЫИГРЫШ: +${wa} 💎`:'😞 ПРОИГРЫШ';document.getElementById('result-message').className=`result-message ${win?'win':'lose'}`;await sendGameResult('blackjack',currentBet,win,wa,{});await afterGame(win)}async function bjh(){if(!ga)return;if(balance<currentBet){showNoBalance();return}ph.push(bjd.pop());rc();await new Promise(r=>setTimeout(r,500));if(ph.reduce((a,b)=>a+b,0)>21)ebj(false)}async function bjs(){if(!ga)return;let ds=dh.reduce((a,b)=>a+b,0);while(ds<17){dh.push(bjd.pop());ds=dh.reduce((a,b)=>a+b,0);rc();await new Promise(r=>setTimeout(r,700))}const ps=ph.reduce((a,b)=>a+b,0);if(ds>21||ps>ds)ebj(true);else ebj(false)}function sbj(){if(balance<currentBet){showNoBalance();return}bjd=ibd();ph=[bjd.pop(),bjd.pop()];dh=[bjd.pop()];ga=true;rc();document.getElementById('result-message').innerHTML='';document.getElementById('result-message').className='result-message'}

        // 🎳 БОУЛИНГ — вид сверху
        let cbb=null,bowlingAnimating=false
        function resetPinsTopView(){const c=document.getElementById('pins-triangle');c.innerHTML=`<div class="bowling-pins-row-new"><span class="bowling-pin-new">🎳</span></div><div class="bowling-pins-row-new"><span class="bowling-pin-new">🎳</span><span class="bowling-pin-new">🎳</span></div><div class="bowling-pins-row-new"><span class="bowling-pin-new">🎳</span><span class="bowling-pin-new">🎳</span><span class="bowling-pin-new">🎳</span></div>`}
        async function playBowling(){if(!cbb){document.getElementById('result-message').innerHTML='❌ Ставка!';return}if(balance<currentBet){showNoBalance();return}if(bowlingAnimating)return;bowlingAnimating=true;const ball=document.getElementById('bowling-ball-top'),rd=document.getElementById('result-message'),sb=document.getElementById('bowling-spin-btn'),ring=document.getElementById('impact-ring');sb.disabled=true;resetPinsTopView();ball.style.animation='none';ball.offsetHeight;ball.style.animation='bowlingTopView 1s ease-in forwards';ring.style.display='none';setTimeout(()=>{const v=Math.floor(Math.random()*6)+1;const win=Math.random()<WIN_RATE;const wa=win?Math.floor(currentBet*2):0;if(win){ring.style.display='block';ring.style.left='50%';ring.style.top='50%';ring.style.animation='impactRing 0.6s ease-out forwards';const pins=document.querySelectorAll('.bowling-pin-new');pins.forEach((p,i)=>{setTimeout(()=>{p.style.animation=`pinScatter 0.5s ease-out forwards`;p.style.setProperty('--sx',`${-30+Math.random()*60}px`);p.style.setProperty('--sy',`${-20+Math.random()*40}px`);p.style.setProperty('--sr',`${-60+Math.random()*120}deg`)},i*50)});spawnWinCoins(5)}rd.innerHTML=win?`🎉 ВЫИГРЫШ: +${wa} 💎`:`😞 ПРОИГРЫШ (${v})`;rd.className=`result-message ${win?'win':'lose'}`;sendGameResult('bowling',currentBet,win,wa,{}).then(()=>{afterGame(win);sb.disabled=false;bowlingAnimating=false;ring.style.display='none'})},1100)}

        // 🎯 ДАРТС — дыхание мишени + пролёт + рикошет
        let cdab=null,dartsAnimating=false
        async function playDarts(){if(!cdab){document.getElementById('result-message').innerHTML='❌ Ставка!';return}if(balance<currentBet){showNoBalance();return}if(dartsAnimating)return;dartsAnimating=true;const dart=document.getElementById('dart-fly-new'),board=document.getElementById('dartboard-breathe'),rd=document.getElementById('result-message'),dr=document.getElementById('dart-result-new'),sb=document.getElementById('darts-spin-btn'),ripple=document.getElementById('ripple-effect');sb.disabled=true;ripple.style.display='none';const v=Math.floor(Math.random()*6)+1;const win=Math.random()<WIN_RATE;dart.style.display='block';dart.style.animation='none';dart.offsetHeight;dart.style.animation='dartFlyIn 0.7s ease-out forwards';board.style.animation='none';board.offsetHeight;setTimeout(()=>{if(win){board.style.animation='dartboardBreathe 0.1s ease 5';ripple.style.display='block';ripple.style.left='50%';ripple.style.top='50%';ripple.style.animation='rippleOut 0.8s ease-out forwards';dr.innerHTML='🎯 Точное попадание!'}else{dart.style.animation='dartMiss 0.5s ease-out forwards';dr.innerHTML=`💨 Мимо!`}const wa=win?Math.floor(currentBet*2):0;rd.innerHTML=win?`🎉 ВЫИГРЫШ: +${wa} 💎`:`😞 ПРОИГРЫШ`;rd.className=`result-message ${win?'win':'lose'}`;sendGameResult('darts',currentBet,win,wa,{}).then(()=>{afterGame(win);sb.disabled=false;dartsAnimating=false;dart.style.display='none';ripple.style.display='none';board.style.animation='dartboardBreathe 2s ease-in-out infinite'})},800)}

        document.querySelectorAll('.game-card').forEach(c=>c.addEventListener('click',()=>showGame(c.dataset.game)));document.getElementById('back-to-menu').addEventListener('click',backToMenu)
        document.querySelectorAll('[data-roulette]').forEach(b=>b.addEventListener('click',()=>{crb=b.dataset.roulette;document.querySelectorAll('[data-roulette]').forEach(x=>x.classList.remove('selected'));b.classList.add('selected')}))
        document.querySelectorAll('[data-dice]').forEach(b=>b.addEventListener('click',()=>{cdb=b.dataset.dice;document.querySelectorAll('[data-dice]').forEach(x=>x.classList.remove('selected'));b.classList.add('selected')}))
        document.querySelectorAll('[data-bowling]').forEach(b=>b.addEventListener('click',()=>{cbb=b.dataset.bowling;document.querySelectorAll('[data-bowling]').forEach(x=>x.classList.remove('selected'));b.classList.add('selected')}))
        document.querySelectorAll('[data-darts]').forEach(b=>b.addEventListener('click',()=>{cdab=b.dataset.darts;document.querySelectorAll('[data-darts]').forEach(x=>x.classList.remove('selected'));b.classList.add('selected')}))
        document.getElementById('spin-btn').addEventListener('click',spinSlots);document.getElementById('roulette-spin-btn').addEventListener('click',spinRoulette);document.getElementById('dice-spin-btn').addEventListener('click',rollDice);document.getElementById('bj-start-btn').addEventListener('click',sbj);document.getElementById('bj-hit').addEventListener('click',bjh);document.getElementById('bj-stand').addEventListener('click',bjs);document.getElementById('bowling-spin-btn').addEventListener('click',playBowling);document.getElementById('darts-spin-btn').addEventListener('click',playDarts)
        initBetButtons();loadBalance();loadDailyBonus();checkPendingPaymentOnLoad();tg.ready()
    </script>
</body>
